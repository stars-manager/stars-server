# ============================================
# Cloud Native Build 配置文件
# ============================================
# 当代码推送到 GitHub 时，自动触发构建和部署
# 
# 工作流程：
# 1. 推送代码到 dev 分支 → 构建 :dev 标签镜像
# 2. 推送代码到 main 分支 → 构建 :latest 标签镜像
# 3. 同时构建版本标签镜像（如 :v1.0.0）
#
# 环境变量说明：
# - CNB_DOCKER_REGISTRY: Docker 镜像仓库地址（自动注入）
# - CNB_REPO_SLUG_LOWERCASE: 项目路径（自动注入）
# ============================================

# ============================================
# dev 分支配置（开发环境）
# ============================================
dev:
  push:
    - services:
        - docker  # 使用 Docker 服务
      stages:
        # 阶段0：代码检查和测试（合并执行，提升效率）
        - name: lint and test
          script: |
            set -e

            echo "🔍 Running code quality checks..."

            # 安装 golangci-lint（如果未安装）
            if ! command -v golangci-lint &> /dev/null; then
              echo "Installing golangci-lint..."
              curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.57.0
              export PATH=$PATH:$(go env GOPATH)/bin
            fi

            # 运行代码检查
            echo "Running golangci-lint..."
            golangci-lint run --timeout=5m || echo "⚠️  Lint warnings found, continuing..."

            # 运行测试
            echo "🧪 Running tests..."
            go mod download
            go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

            # 显示覆盖率摘要
            go tool cover -func=coverage.txt | tail -n 1

            echo "✅ Lint and test completed"

        # 阶段1：构建和推送镜像
        - name: build and push
          script: |
            set -e

            # 获取版本信息
            VERSION=$(git describe --tags --always --dirty)
            GIT_COMMIT=$(git rev-parse --short HEAD)
            BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            echo "Building version: ${VERSION}"
            echo "Git commit: ${GIT_COMMIT}"
            echo "Build time: ${BUILD_TIME}"

            # 构建镜像（启用 BuildKit）
            DOCKER_BUILDKIT=1 docker build \
              --build-arg VERSION=${VERSION} \
              --build-arg GIT_COMMIT=${GIT_COMMIT} \
              --build-arg BUILD_TIME=${BUILD_TIME} \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:dev \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} \
              .

            # 推送镜像
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:dev
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}

            echo "✅ Build and push completed successfully"

        # 阶段2：镜像安全扫描
        - name: security scan
          script: |
            VERSION=$(git describe --tags --always --dirty)

            echo "🔍 Running security scan with Trivy..."

            # 安装 Trivy
            if curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.49.0; then
              # 扫描镜像漏洞
              trivy image \
                --severity HIGH,CRITICAL \
                --exit-code 0 \
                --ignore-unfixed \
                --format table \
                ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} || \
                echo "⚠️  Security scan found vulnerabilities, please review"
              
              echo "✅ Security scan completed"
            else
              echo "⚠️  Trivy installation failed, skipping security scan"
            fi

        # 阶段3：构建通知
        - name: notify
          script: |
            VERSION=$(git describe --tags --always --dirty)
            GIT_COMMIT=$(git rev-parse --short HEAD)

            echo "📧 Build Notification"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "✅ Branch: dev"
            echo "✅ Version: ${VERSION}"
            echo "✅ Commit: ${GIT_COMMIT}"
            echo "✅ Image: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # 可选：发送 Webhook 通知（Slack/钉钉/企业微信等）
            # curl -X POST -H 'Content-type: application/json' \
            #   --data "{\"text\":\"Build succeeded: ${VERSION}\"}" \
            #   ${WEBHOOK_URL} || true

# ============================================
# main 分支配置（生产环境）
# ============================================
main:
  push:
    - services:
        - docker  # 使用 Docker 服务
      stages:
        # 阶段0：代码检查和测试（生产环境必须通过）
        - name: lint and test
          script: |
            set -e

            echo "🔍 Running code quality checks..."

            # 安装 golangci-lint（如果未安装）
            if ! command -v golangci-lint &> /dev/null; then
              echo "Installing golangci-lint..."
              curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.57.0
              export PATH=$PATH:$(go env GOPATH)/bin
            fi

            # 运行代码检查（生产环境更严格）
            echo "Running golangci-lint..."
            golangci-lint run --timeout=5m --max-issues-per-linter=0 --max-same-issues=0

            # 运行测试（生产环境要求覆盖率）
            echo "🧪 Running tests with coverage..."
            go mod download
            go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

            # 检查覆盖率阈值（可选：要求最低覆盖率）
            COVERAGE=$(go tool cover -func=coverage.txt | grep total | awk '{print $3}' | sed 's/%//')
            echo "📊 Total coverage: ${COVERAGE}%"

            # 可选：强制最低覆盖率（例如 60%）
            # if (( $(echo "${COVERAGE} < 60" | bc -l) )); then
            #   echo "❌ Coverage ${COVERAGE}% is below threshold 60%"
            #   exit 1
            # fi

            echo "✅ Lint and test completed"

        # 阶段1：构建和推送镜像
        - name: build and push
          script: |
            set -e

            # 获取版本信息
            VERSION=$(git describe --tags --always)
            GIT_COMMIT=$(git rev-parse --short HEAD)
            BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            echo "Building version: ${VERSION}"
            echo "Git commit: ${GIT_COMMIT}"
            echo "Build time: ${BUILD_TIME}"

            # 构建镜像（启用 BuildKit）
            DOCKER_BUILDKIT=1 docker build \
              --build-arg VERSION=${VERSION} \
              --build-arg GIT_COMMIT=${GIT_COMMIT} \
              --build-arg BUILD_TIME=${BUILD_TIME} \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} \
              .

            # 推送镜像
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}

            echo "✅ Build and push completed successfully"

        # 阶段2：镜像安全扫描（生产环境）
        - name: security scan
          script: |
            VERSION=$(git describe --tags --always)

            echo "🔍 Running security scan with Trivy..."

            # 安装 Trivy
            if curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.49.0; then
              # 扫描镜像漏洞（生产环境扫描所有类型）
              trivy image \
                --severity HIGH,CRITICAL \
                --exit-code 0 \
                --ignore-unfixed \
                --vuln-type os,library \
                --format table \
                ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} || \
                echo "⚠️  Security scan found vulnerabilities, please review"
              
              # 生成 SARIF 报告（用于 GitHub Security、SonarQube 等）
              trivy image \
                --format sarif \
                --output trivy-results.sarif \
                ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} || \
                echo "⚠️  SARIF report generation failed"
              
              # 生成 JSON 报告（用于归档和分析）
              trivy image \
                --format json \
                --output trivy-results.json \
                ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} || true
              
              echo "✅ Security scan completed"
              echo "📊 Reports saved: trivy-results.sarif, trivy-results.json"
            else
              echo "⚠️  Trivy installation failed, skipping security scan"
            fi

        # 阶段3：构建通知（生产环境）
        - name: notify
          script: |
            VERSION=$(git describe --tags --always)
            GIT_COMMIT=$(git rev-parse --short HEAD)
            BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            echo "📧 Production Build Notification"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Branch: main (PRODUCTION)"
            echo "🏷️  Version: ${VERSION}"
            echo "📝 Commit: ${GIT_COMMIT}"
            echo "⏰ Build Time: ${BUILD_TIME}"
            echo "🐳 Image: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}"
            echo "🐳 Latest: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # 可选：发送 Webhook 通知到 Slack/钉钉/企业微信等
            # 示例：Slack Webhook
            # curl -X POST -H 'Content-type: application/json' \
            #   --data "{
            #     \"text\":\"🚀 Production Build Succeeded\",
            #     \"attachments\":[{
            #       \"fields\":[
            #         {\"title\":\"Version\",\"value\":\"${VERSION}\",\"short\":true},
            #         {\"title\":\"Commit\",\"value\":\"${GIT_COMMIT}\",\"short\":true},
            #         {\"title\":\"Image\",\"value\":\"${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}\",\"short\":false}
            #       ]
            #     }]
            #   }" \
            #   ${SLACK_WEBHOOK_URL} || true
            
