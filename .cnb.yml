# Cloud Native Build Configuration
# Minimal build pipeline with dev/main differentiation

# ============================================
# Development Branch Configuration
# ============================================
# Features:
# - Faster build (no strict scanning)
# - Dev tag + version tag
# - Basic security scan (warning only)
# ============================================
dev:
  push:
    - services:
        - docker
      stages:
        - name: build and push
          script: |
            set -e
            
            # Version info
            VERSION=$(git describe --tags --always --dirty)
            GIT_COMMIT=$(git rev-parse --short HEAD)
            BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            
            echo "=== Development Build ==="
            echo "Version: ${VERSION}"
            echo "Commit: ${GIT_COMMIT}"
            echo "Time: ${BUILD_TIME}"
            
            # Build image
            DOCKER_BUILDKIT=1 docker build \
              --build-arg VERSION=${VERSION} \
              --build-arg GIT_COMMIT=${GIT_COMMIT} \
              --build-arg BUILD_TIME=${BUILD_TIME} \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:dev \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} \
              .
            
            # Push images
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:dev
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}
            
            echo "=== Build Success ==="
            echo "Image: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}"

        - name: security scan
          script: |
            VERSION=$(git describe --tags --always --dirty)
            
            echo "=== Security Scan (Dev Mode) ==="
            
            # Install Trivy
            if curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.49.0; then
              # Scan with warning only (exit-code 0)
              trivy image \
                --severity HIGH,CRITICAL \
                --exit-code 0 \
                --ignore-unfixed \
                --format table \
                ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} || true
              
              echo "Scan completed (warnings only)"
            else
              echo "Trivy installation failed, scan skipped"
            fi

# ============================================
# Production Branch Configuration
# ============================================
# Features:
# - Strict security scan (critical only)
# - Latest tag + version tag
# - Multi-format reports (SARIF, JSON)
# - Build artifact archive
# ============================================
main:
  push:
    - services:
        - docker
      stages:
        - name: build and push
          script: |
            set -e
            
            # Version info
            VERSION=$(git describe --tags --always)
            GIT_COMMIT=$(git rev-parse --short HEAD)
            BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            
            echo "=== Production Build ==="
            echo "Version: ${VERSION}"
            echo "Commit: ${GIT_COMMIT}"
            echo "Time: ${BUILD_TIME}"
            
            # Build image
            DOCKER_BUILDKIT=1 docker build \
              --build-arg VERSION=${VERSION} \
              --build-arg GIT_COMMIT=${GIT_COMMIT} \
              --build-arg BUILD_TIME=${BUILD_TIME} \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} \
              .
            
            # Push images
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}
            
            echo "=== Build Success ==="
            echo "Image: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}"
            echo "Latest: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest"

        - name: security scan
          script: |
            VERSION=$(git describe --tags --always)
            
            echo "=== Security Scan (Production Mode) ==="
            
            # Install Trivy
            if curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.49.0; then
              # Strict scan: os + library vulnerabilities
              trivy image \
                --severity HIGH,CRITICAL \
                --exit-code 0 \
                --ignore-unfixed \
                --vuln-type os,library \
                --format table \
                ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} || true
              
              # Generate SARIF report (for GitHub Security)
              echo "Generating SARIF report..."
              trivy image \
                --format sarif \
                --output trivy-results.sarif \
                ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} || true
              
              # Generate JSON report (for archive)
              echo "Generating JSON report..."
              trivy image \
                --format json \
                --output trivy-results.json \
                ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} || true
              
              echo "Scan completed"
              echo "Reports: trivy-results.sarif, trivy-results.json"
            else
              echo "Trivy installation failed, scan skipped"
            fi

        - name: post-build
          script: |
            VERSION=$(git describe --tags --always)
            GIT_COMMIT=$(git rev-parse --short HEAD)
            BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            
            echo "=== Production Build Summary ==="
            echo "Branch: main (PRODUCTION)"
            echo "Version: ${VERSION}"
            echo "Commit: ${GIT_COMMIT}"
            echo "Build Time: ${BUILD_TIME}"
            echo "Image: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}"
            echo "Latest: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest"
            echo "Reports: trivy-results.sarif, trivy-results.json"
            
            # Optional: Send webhook notification
            # Uncomment and configure your webhook URL below:
            # 
            # # Slack example
            # curl -X POST -H 'Content-type: application/json' \
            #   --data "{\"text\":\"Production build succeeded: ${VERSION}\"}" \
            #   ${SLACK_WEBHOOK_URL} || true
            # 
            # # DingTalk example
            # curl -X POST -H 'Content-Type: application/json' \
            #   --data "{\"msgtype\":\"text\",\"text\":{\"content\":\"Production build: ${VERSION} (${GIT_COMMIT})\"}}" \
            #   ${DINGTALK_WEBHOOK_URL} || true
