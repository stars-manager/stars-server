            #     \"msgtype\":\"markdown\",
            #     \"markdown\":{
            #       \"title\":\"构建成功\",
            #       \"text\":\"## 🚀 生产环境构建成功\\n- **版本**: ${VERSION}\\n- **提交**: ${GIT_COMMIT}\\n- **镜像**: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}\"
