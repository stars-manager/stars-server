# ============================================
# Cloud Native Build 配置文件
# ============================================
# 当代码推送到 GitHub 时，自动触发构建和部署
# 
# 工作流程：
# 1. 推送代码到 dev 分支 → 构建 :dev 标签镜像
# 2. 推送代码到 main 分支 → 构建 :latest 标签镜像
# 3. 同时构建版本标签镜像（如 :v1.0.0）
#
# 环境变量说明：
# - CNB_DOCKER_REGISTRY: Docker 镜像仓库地址（自动注入）
# - CNB_REPO_SLUG_LOWERCASE: 项目路径（自动注入）
# ============================================

# ============================================
# dev 分支配置（开发环境）
# ============================================
dev:
  push:
    - services:
        - docker  # 使用 Docker 服务
      stages:
        # 阶段0：运行测试（可选，确保代码质量）
        - name: run tests
          script: |
            set -e  # 遇到错误立即退出
            go mod download
            go test -v ./...

        # 阶段1：构建和推送镜像（合并为一个阶段，确保变量可用）
        - name: build and push
          script: |
            set -e  # 遇到错误立即退出

            # 获取版本信息
            VERSION=$(git describe --tags --always --dirty)
            GIT_COMMIT=$(git rev-parse --short HEAD)
            BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            echo "Building version: ${VERSION}"
            echo "Git commit: ${GIT_COMMIT}"
            echo "Build time: ${BUILD_TIME}"

            # 构建镜像（启用 BuildKit 缓存）
            DOCKER_BUILDKIT=1 docker build \
              --build-arg VERSION=${VERSION} \
              --build-arg GIT_COMMIT=${GIT_COMMIT} \
              --build-arg BUILD_TIME=${BUILD_TIME} \
              --cache-from ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:dev \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:dev \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} \
              .

            # 推送镜像
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:dev
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}

            echo "✅ Build and push completed successfully"

        # 阶段2：镜像安全扫描（开发环境）
        - name: security scan
          script: |
            set -e

            VERSION=$(git describe --tags --always --dirty)

            echo "🔍 Running security scan with Trivy..."

            # 安装 Trivy
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.49.0

            # 扫描镜像漏洞
            trivy image \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --ignore-unfixed \
              ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}

            echo "✅ Security scan passed"

# ============================================
# main 分支配置（生产环境）
# ============================================
main:
  push:
    - services:
        - docker  # 使用 Docker 服务
      stages:
        # 阶段0：运行测试（生产环境必须通过测试）
        - name: run tests
          script: |
            set -e  # 遇到错误立即退出
            go mod download
            go test -v -race -coverprofile=coverage.txt ./...

        # 阶段1：构建和推送镜像（合并为一个阶段，确保变量可用）
        - name: build and push
          script: |
            set -e  # 遇到错误立即退出

            # 获取版本信息
            VERSION=$(git describe --tags --always)
            GIT_COMMIT=$(git rev-parse --short HEAD)
            BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            echo "Building version: ${VERSION}"
            echo "Git commit: ${GIT_COMMIT}"
            echo "Build time: ${BUILD_TIME}"

            # 构建镜像（启用 BuildKit 缓存）
            DOCKER_BUILDKIT=1 docker build \
              --build-arg VERSION=${VERSION} \
              --build-arg GIT_COMMIT=${GIT_COMMIT} \
              --build-arg BUILD_TIME=${BUILD_TIME} \
              --cache-from ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest \
              -t ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION} \
              .

            # 推送镜像
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
            docker push ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}

            echo "✅ Build and push completed successfully"

        # 阶段2：镜像安全扫描（生产环境，更严格）
        - name: security scan
          script: |
            set -e

            VERSION=$(git describe --tags --always)

            echo "🔍 Running security scan with Trivy..."

            # 安装 Trivy
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.49.0

            # 扫描镜像漏洞（生产环境扫描所有级别）
            trivy image \
              --severity HIGH,CRITICAL \
              --exit-code 1 \
              --ignore-unfixed \
              --vuln-type os,library \
              ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}

            # 生成 SARIF 报告（可选，用于 CI 集成）
            trivy image \
              --format sarif \
              --output trivy-results.sarif \
              ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION}

            echo "✅ Security scan passed"
            echo "📊 SARIF report saved to trivy-results.sarif"
